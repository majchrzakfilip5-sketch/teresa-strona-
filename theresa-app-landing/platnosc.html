<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Płatność w przygotowaniu | Teresa</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: #F4EEE5; color: #1C1F21;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      padding: 24px;
    }
    main { max-width: 560px; text-align: center; }
    img { width: 72px; height: 72px; object-fit: contain; margin: 0 auto 28px; display: block; }
    h1 { font-size: clamp(26px, 4vw, 38px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; }
    p { margin-top: 16px; font-size: 17px; line-height: 1.6; color: #4A4E51; }
    #plan { margin-top: 10px; font-weight: 600; color: #2F7E7E; }
    a {
      display: inline-block; margin-top: 36px; padding: 15px 28px;
      background: #2F7E7E; color: #fff; text-decoration: none;
      border-radius: 999px; font-weight: 700; font-size: 16px;
      transition: background 200ms ease-out;
    }
    a:hover, a:focus-visible { background: #266A6A; }
  </style>
</head>
<body>
  <main>
    <img src="./logo-teresa.png" alt="">
    <h1>Tu kiedyś będzie strona do obsługiwania płatności.</h1>
    <p>Pracujemy nad bezpiecznym systemem płatności. Wróć wkrótce.</p>
    <p id="plan" hidden></p>
    <a href="./index.html">Wróć na stronę główną</a>
  </main>
  <script>
    const names = { start: 'Na początek (0 zł)', rodzina: 'Dla rodziny (19,99 zł/mies.)', plus: 'Teresa Plus (34,99 zł/mies.)' };
    const plan = new URLSearchParams(location.search).get('plan');
    if (names[plan]) {
      const el = document.getElementById('plan');
      el.textContent = 'Wybrany plan: ' + names[plan];
      el.hidden = false;
    }
  </script>
</body>
</html>
